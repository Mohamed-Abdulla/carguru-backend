version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: carguru_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: carguru
      POSTGRES_USER: carguru_user
      POSTGRES_PASSWORD: carguru_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U carguru_user -d carguru" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carguru_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: carguru
      DB_USER: carguru_user
      DB_PASSWORD: carguru_pass
      DB_POOL_MAX: 10
      DB_POOL_IDLE_TIMEOUT_MS: 30000
      DB_POOL_CONNECTION_TIMEOUT_MS: 2000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,https://carguru-frontend.vercel.app
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "3003:3003"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
